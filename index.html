<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWAR NEWS | 30,000 Ultra Archive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --neon: #00f2ff; }
        body { background: #000; color: #fff; font-family: 'Space Grotesk', sans-serif; overflow-x: hidden; margin: 0; }

        /* 1. SOLAR SYSTEM ANIMATION (LOGIN) */
        .solar-container {
            position: fixed; inset: 0; z-index: -1;
            background: radial-gradient(circle at center, #001220 0%, #000 100%);
        }
        .sun {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: #ffcc00; border-radius: 50%;
            box-shadow: 0 0 50px #ffcc00;
        }
        .orbit {
            position: absolute; top: 50%; left: 50%; border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%; transform: translate(-50%, -50%);
            animation: rotate var(--t) linear infinite;
        }
        .planet-ball {
            position: absolute; top: -10px; left: 50%; width: 15px; height: 15px;
            background: var(--c); border-radius: 50%; box-shadow: 0 0 15px var(--c);
        }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* 2. NATURE BACKGROUNDS (ARCHIVE) */
        .nature-layer {
            position: fixed; inset: 0; z-index: -1;
            background-size: cover; background-position: center;
            transition: background-image 2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(0.3) saturate(1.2);
        }

        /* 3. TRANSFORMER LOGO */
        .logo-transformer {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #fff 0%, #aaa 45%, #555 55%, #000 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900; filter: drop-shadow(0 0 10px var(--neon));
            padding: 10px 30px; border: 2px solid rgba(255,255,255,0.1);
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
        }

        /* 4. CONTENT STYLING */
        .event-card {
            background: rgba(0,0,0,0.8); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s; position: relative;
        }
        .event-card:hover { border-color: var(--neon); transform: scale(1.02); z-index: 10; }
        
        .explanation-text {
            font-size: 10px; line-height: 1.6; color: #a1a1aa;
            text-align: justify; border-top: 1px solid rgba(0,242,255,0.1);
            padding-top: 10px; height: 320px; overflow-y: auto;
        }

        .page-transition { transition: 1.5s cubic-bezier(0.9, 0, 0.1, 1); }
        .hidden-view { opacity: 0; transform: translateY(100vh); pointer-events: none; }
    </style>
</head>
<body>

    <div id="login-view" class="fixed inset-0 z-[2000] flex items-center justify-center page-transition">
        <div class="solar-container" id="solar-system">
            <div class="sun"></div>
            </div>
        
        <div class="max-w-md w-full p-12 bg-black/50 backdrop-blur-2xl rounded-[60px] border border-white/5 text-center">
            <h1 class="logo-transformer text-4xl mb-6">ANWAR NEWS</h1>
            <p class="text-cyan-400 tracking-[0.6em] text-[9px] mb-12 uppercase animate-pulse">Establishing 30,000 Uplinks...</p>
            
            <form id="loginForm" class="space-y-6">
                <input type="text" placeholder="ARCHIVE_ID" required class="w-full bg-white/5 border-b border-cyan-800 p-4 outline-none focus:border-cyan-400 transition text-center text-sm">
                <input type="password" placeholder="DECRYPT_KEY" required class="w-full bg-white/5 border-b border-cyan-800 p-4 outline-none focus:border-cyan-400 transition text-center text-sm">
                <button type="submit" class="w-full bg-cyan-600 text-white py-4 font-black rounded-xl hover:bg-white hover:text-black transition-all duration-700 uppercase tracking-widest italic">
                    INITIALIZE SYSTEM
                </button>
            </form>
        </div>
    </div>

    <div id="archive-view" class="hidden opacity-0 page-transition min-h-screen">
        <div id="nature-bg" class="nature-layer"></div>
        
        <header class="p-6 bg-black/90 sticky top-0 z-[100] border-b border-cyan-900/30 backdrop-blur-3xl flex justify-between items-center">
            <h1 class="logo-transformer text-2xl">ANWAR NEWS</h1>
            <div id="env-tag" class="text-cyan-500 font-mono text-[9px] tracking-widest uppercase">System Status: Optimal</div>
        </header>

        <main class="max-w-[1800px] mx-auto p-8 pb-48">
            <div class="mb-12">
                <h2 id="sector-display" class="text-8xl font-black italic text-white uppercase tracking-tighter"></h2>
                <p class="text-gray-400 max-w-3xl mt-4">Database node containing 40 high-resolution historical records. Each entry contains 20 lines of deep-analysis regarding the socio-technological impact of the event.</p>
            </div>

            <div id="archive-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
                </div>
        </main>

        <footer class="fixed bottom-0 inset-x-0 p-10 bg-black/95 border-t border-cyan-900/30 z-[100] flex items-center justify-between">
            <button onclick="move(-1)" class="px-12 py-4 border border-cyan-500 text-cyan-500 hover:bg-cyan-500 hover:text-white transition font-black italic skew-x-[-15deg]">PREVIOUS</button>
            <div class="text-center">
                <div class="text-6xl font-black text-white" id="page-counter">001</div>
                <div class="text-[9px] text-gray-500 font-mono tracking-[0.5em]">SECTOR OF 750</div>
            </div>
            <button onclick="move(1)" class="px-12 py-4 bg-cyan-700 text-white hover:bg-white hover:text-black transition font-black italic skew-x-[-15deg]">NEXT</button>
        </footer>
    </div>

    <script>
        // 1. SOLAR SYSTEM ENGINE
        const solar = document.getElementById('solar-system');
        const orbits = [
            { r: '200px', t: '8s', c: '#888' },
            { r: '350px', t: '15s', c: '#ff5722' },
            { r: '500px', t: '25s', c: '#03a9f4' },
            { r: '700px', t: '40s', c: '#4caf50' },
            { r: '900px', t: '60s', c: '#9c27b0' }
        ];
        orbits.forEach(o => {
            const orb = document.createElement('div');
            orb.className = 'orbit';
            orb.style.width = orb.style.height = o.r;
            orb.style.setProperty('--t', o.t);
            const p = document.createElement('div');
            p.className = 'planet-ball';
            p.style.setProperty('--c', o.c);
            orb.appendChild(p);
            solar.appendChild(orb);
        });

        // 2. DATA CONFIG
        const totalSectors = 750;
        let currentSector = 1;

        const natureScenes = [
            { url: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", n: "Alpine Mountains" },
            { url: "https://images.unsplash.com/photo-1433086966358-54859d0ed716", n: "Tropical Waterfalls" },
            { url: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05", n: "Greenland Sunset" },
            { url: "https://images.unsplash.com/photo-1464802686167-b939a6910659", n: "Deep Space Stars" },
            { url: "https://images.unsplash.com/photo-1501785888041-af3ef285b470", n: "Lakeside Sky" }
        ];

        // 3. EXPLANATION GENERATOR (Creates 20 Lines)
        function generate20Lines(id) {
            const sentences = [
                "Analysis of global data stream indicates significant historical shift.",
                "Deep-learning nodes have verified the authenticity of this record.",
                "Socio-economic impact factors exceed the threshold of 85.4%.",
                "Atmospheric conditions during this event were recorded as stable.",
                "Technological advancements in this era paved way for neural links.",
                "Global leaders converged to discuss the implications of this shift.",
                "Financial markets reacted with unprecedented volatility during the surge.",
                "Cultural milestones achieved here defined the next three generations.",
                "Biological data suggests an evolution in human-nature interaction.",
                "Digital archives from source Alpha-9 confirm high-priority status.",
                "Quantum encryption was utilized to protect the integrity of this file.",
                "The energy signature detected at the site was massive and unique.",
                "Satellite imagery reveals a transformation in geographical terrain.",
                "Policy changes following this event restructured the global alliance.",
                "Educational systems were overhauled to integrate these new findings.",
                "Communication protocols shifted to a decentralized lattice network.",
                "The core objective of this entry is to preserve the truth of the event.",
                "AI observers have flagged this moment as a 'Point of No Return'.",
                "Final verification completed by Anwar News Cryptographic Engine.",
                "End of deep-data explanation for Global Record #" + id + "."
            ];
            return sentences.join('<br>'); // Join with line breaks to force exactly 20 lines
        }

        // 4. CORE ENGINE
        function render(s) {
            const grid = document.getElementById('archive-grid');
            const bg = document.getElementById('nature-bg');
            const envTag = document.getElementById('env-tag');
            
            grid.innerHTML = '';
            document.getElementById('sector-display').innerText = `SECTOR ${s}`;
            document.getElementById('page-counter').innerText = String(s).padStart(3, '0');

            // Set Background
            const scene = natureScenes[s % natureScenes.length];
            bg.style.backgroundImage = `url('${scene.url}?w=1600')`;
            envTag.innerText = `Environment: ${scene.n} // Total: 30,000`;

            for(let i=1; i<=40; i++) {
                const id = (s-1)*40 + i;
                const year = 1995 + Math.floor(id/1000);
                
                grid.innerHTML += `
                    <div class="event-card rounded-[30px] p-6 group">
                        <div class="overflow-hidden rounded-2xl mb-4">
                            <img src="https://picsum.photos/seed/${id}/600/400" class="w-full h-40 object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                        </div>
                        <div class="flex justify-between items-center mb-4">
                            <span class="text-cyan-400 font-bold font-mono text-xl">${year}</span>
                            <span class="bg-white/10 px-3 py-1 rounded-full text-[8px] tracking-widest uppercase">REC_${id}</span>
                        </div>
                        <h4 class="text-white font-bold text-lg mb-4 uppercase tracking-tighter">Global Incident Report #${id}</h4>
                        <div class="explanation-text">
                            ${generate20Lines(id)}
                        </div>
                    </div>
                `;
            }
            window.scrollTo({top:0, behavior:'smooth'});
        }

        // 5. UI ACTIONS
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('login-view').classList.add('hidden-view');
            setTimeout(() => {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('archive-view').classList.remove('hidden');
                setTimeout(() => {
                    document.getElementById('archive-view').style.opacity = '1';
                    render(1);
                }, 100);
            }, 1500);
        });

        function move(dir) {
            currentSector += dir;
            if(currentSector < 1) currentSector = totalSectors;
            if(currentSector > totalSectors) currentSector = 1;
            render(currentSector);
        }
    </script>
</body>
</html>
