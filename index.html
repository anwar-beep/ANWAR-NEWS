<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANWAR NEWS - The Grand Archive (1995-2026)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Roboto:wght@300;700&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; font-family: 'Roboto', sans-serif; background: #000; overflow-x: hidden; color: white; }
        
        /* 1. LOGIN ANIMATED GRADIENT & BUBBLES */
        .login-view {
            background: linear-gradient(-45deg, #000428, #004e92, #0d0124, #001220);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            position: fixed; inset: 0; z-index: 100;
            display: flex; align-items: center; justify-content: center;
            transition: all 1s cubic-bezier(0.7, 0, 0.3, 1);
        }
        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .bubble {
            position: absolute; bottom: -100px; background: rgba(255, 255, 255, 0.1);
            border-radius: 50%; animation: rise 8s infinite ease-in; pointer-events: none;
        }
        @keyframes rise { 
            0% { bottom: -100px; transform: translateX(0); opacity: 0; } 
            20% { opacity: 0.5; }
            100% { bottom: 100vh; transform: translateX(100px); opacity: 0; } 
        }

        /* 2. TRANSFORMER LOGO */
        .logo-transformer {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #888 0%, #fff 50%, #444 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px rgba(0, 242, 255, 0.5));
            text-transform: uppercase; font-weight: 900;
        }

        /* 3. ARCHIVE VIEW (GALAXY & NATURE) */
        .archive-view {
            display: none; min-height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1464802686167-b939a6910659?w=1920');
            background-size: cover; background-attachment: fixed;
            padding-bottom: 120px;
        }

        .event-card {
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1); transition: 0.4s;
            border-radius: 20px; overflow: hidden;
        }
        .event-card:hover { border-color: #00f2ff; transform: scale(1.03); background: rgba(255,255,255,0.08); }

        .hidden-login { transform: translateY(-100%) scale(0.8); opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

    <div id="bubbles-box" class="fixed inset-0 pointer-events-none z-[101]"></div>

    <div id="login-page" class="login-view">
        <div class="max-w-md w-full p-10 bg-black/40 backdrop-blur-xl border border-white/10 rounded-[40px] shadow-2xl text-center">
            <h1 class="logo-transformer text-4xl mb-2">ANWAR NEWS</h1>
            <p class="text-cyan-400 tracking-[0.4em] text-[10px] mb-8">SECURE ARCHIVE ACCESS</p>
            
            <form id="loginForm" class="space-y-6">
                <input type="email" placeholder="EMAIL ADDRESS" required class="w-full bg-white/5 border-b-2 border-white/20 p-3 outline-none focus:border-cyan-400 transition">
                <input type="password" placeholder="SECURITY KEY" required class="w-full bg-white/5 border-b-2 border-white/20 p-3 outline-none focus:border-cyan-400 transition">
                <button type="submit" class="w-full bg-cyan-600 py-4 font-bold rounded-xl hover:bg-white hover:text-black transition-all duration-500 uppercase tracking-widest">
                    Decrypt & Enter
                </button>
            </form>
        </div>
    </div>

    <div id="archive-page" class="archive-view">
        <header class="p-6 bg-black/80 sticky top-0 z-50 border-b border-cyan-900">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="logo-transformer text-2xl">ANWAR NEWS</h1>
                <div class="text-yellow-500 font-mono text-xs hidden md:block">DATABASE: 1995_2026 // ALL SECTORS READY</div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-8">
            <div id="page-info" class="mb-8">
                <h2 id="page-title" class="text-4xl font-black text-cyan-400 italic"></h2>
                <p class="text-gray-400 mt-2">Showing 5 Global Records for this era.</p>
            </div>
            
            <div id="events-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                </div>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 p-6 bg-black/90 backdrop-blur-2xl border-t border-cyan-500/20">
            <div class="max-w-4xl mx-auto flex items-center justify-between">
                <button onclick="changePage(-1)" class="px-8 py-3 border border-cyan-500 text-cyan-500 hover:bg-cyan-500 hover:text-white transition rounded-full font-bold">PREV</button>
                <div class="text-center">
                    <span id="page-display" class="text-4xl font-black text-white">01</span>
                    <span class="text-gray-500"> / 25</span>
                </div>
                <button onclick="changePage(1)" class="px-8 py-3 bg-cyan-600 text-white hover:bg-cyan-400 transition rounded-full font-bold">NEXT</button>
            </div>
        </footer>
    </div>

    <script>
        // 1. GENERATE BUBBLES
        const bBox = document.getElementById('bubbles-box');
        for(let i=0; i<15; i++){
            const b = document.createElement('div');
            b.className = 'bubble';
            b.style.left = Math.random()*100 + 'vw';
            b.style.width = b.style.height = (Math.random()*40 + 10) + 'px';
            b.style.animationDelay = Math.random()*5 + 's';
            bBox.appendChild(b);
        }

        // 2. DATA ARCHIVE (Pages 1-25)
        const totalPages = 25;
        let currentPage = 1;

        // Function kutengeneza data fake lakini zenye mpangilio wa miaka
        const masterArchive = {};
        const startYear = 1995;
        const endYear = 2026;

        for(let p=1; p<=totalPages; p++) {
            let yearVal = startYear + Math.floor((p-1) * 1.2); 
            masterArchive[p] = {
                title: `Sector ${p}: Global Evolution`,
                events: [
                    { y: yearVal, n: "Major Political Shift", d: "Deep analysis of global leadership changes and treaty signings during this specific window of history.", i: "https://images.unsplash.com/photo-1529107386315-e1a2ed48a620?w=500" },
                    { y: yearVal, n: "Tech Breakthrough", d: "A revolutionary invention in digital communication that paved the way for the modern internet and AI systems we use today.", i: "https://images.unsplash.com/photo-1518770660439-4636190af475?w=500" },
                    { y: yearVal, n: "Natural Phenomenon", d: "Significant environmental events that changed how humanity interacts with the planet's ecosystems and climate policy.", i: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500" },
                    { y: yearVal, n: "Cultural Milestone", d: "Music, Art, and Cinema reached new heights, creating iconic moments that defined the generation of this era.", i: "https://images.unsplash.com/photo-1514525253361-b83f859b71c2?w=500" },
                    { y: yearVal, n: "Economic Expansion", d: "Markets worldwide saw unprecedented growth as new trade routes and digital currencies began to take shape.", i: "https://images.unsplash.com/photo-1611974714658-52d3a776c535?w=500" }
                ]
            };
        }

        // 3. LOGIN LOGIC
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('login-page').classList.add('hidden-login');
            setTimeout(() => {
                document.getElementById('archive-page').style.display = 'block';
                renderPage(1);
            }, 600);
        });

        // 4. RENDER PAGE
        function renderPage(p) {
            const data = masterArchive[p];
            document.getElementById('page-title').innerText = data.title;
            document.getElementById('page-display').innerText = String(p).padStart(2, '0');
            
            const grid = document.getElementById('events-grid');
            grid.innerHTML = '';

            data.events.forEach(ev => {
                grid.innerHTML += `
                    <div class="event-card group cursor-pointer">
                        <div class="h-48 overflow-hidden">
                            <img src="${ev.i}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <div class="p-6">
                            <span class="text-cyan-400 font-bold font-mono text-xl">${ev.y}</span>
                            <h4 class="text-white text-2xl font-bold mt-1">${ev.n}</h4>
                            <p class="text-gray-400 text-sm mt-3 leading-relaxed">${ev.d}</p>
                            <div class="mt-4 pt-4 border-t border-white/5 text-[10px] text-cyan-700 tracking-widest">DECRYPTED_SUCCESSFULLY</div>
                        </div>
                    </div>
                `;
            });
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function changePage(dir) {
            currentPage += dir;
            if(currentPage < 1) currentPage = totalPages;
            if(currentPage > totalPages) currentPage = 1;
            renderPage(currentPage);
        }
    </script>
</body>
</html>
